services:
  ramp-motion:
    build: .
    image: ramp-motion:0.1.0
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/data
    restart: unless-stopped
