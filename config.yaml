streams:
  # 5 RTSP sources. Replace placeholders with real URLs per deployment
  # (or copy to config.test.yaml for local experimentation — see .gitignore).
  # nvstreammux upscales each input to 1920x1080 by default, so the ROI
  # coordinates below are in 1920x1080 space.
  - stream_id: cam-01
    rtsp_url: rtsp://USER:PASS@CAMERA_01_HOST:554/stream
    roi: { x: 320, y: 180, width: 1280, height: 720 }
  - stream_id: cam-02
    rtsp_url: rtsp://USER:PASS@CAMERA_02_HOST:554/stream
    roi: { x: 320, y: 180, width: 1280, height: 720 }
  - stream_id: cam-03
    rtsp_url: rtsp://USER:PASS@CAMERA_03_HOST:554/stream
    roi: { x: 320, y: 180, width: 1280, height: 720 }
  - stream_id: cam-04
    rtsp_url: rtsp://USER:PASS@CAMERA_04_HOST:554/stream
    roi: { x: 320, y: 180, width: 1280, height: 720 }
  - stream_id: cam-05
    rtsp_url: rtsp://USER:PASS@CAMERA_05_HOST:554/stream
    roi: { x: 320, y: 180, width: 1280, height: 720 }

motion:
  # Raise thresh + min_blob_area_px in production to avoid triggering on
  # wind/shadow noise on outdoor cameras.
  thresh: 0.01
  t_quiet_sec: 5.0
  t_enter_sec: 0.5
  min_blob_area_px: 100
  calib_rate_limit_sec: 1.0
  t_stale_sec: 10.0

mog2:
  history: 500
  var_threshold: 16.0
  detect_shadows: true

clahe:
  clip_limit: 2.0
  tile_grid: [8, 8]

pipeline:
  target_fps: 5
  rtsp_reconnect_interval_sec: 5
  rtsp_reconnect_attempts: -1
  batch_size_auto: true

storage:
  root: /data
  jpeg_quality: 85

logging:
  level: INFO
  events_log: /data/events.log
